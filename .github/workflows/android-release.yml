name: Android Release Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android AAB (Production)
        run: eas build --platform android --profile production --non-interactive --wait

      - name: Submit to Google Play Internal Track
        run: eas submit --platform android --profile production --non-interactive
